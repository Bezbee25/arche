- created_at: '2026-03-08T11:05:22.771061'
  description: 'Reproduce and identify the root cause of: actuelement si le texte
    dépasse la section, on voit la fin du texte, si on veut remonter, ça remet en
    bas au bout de quelques seconde, il faut que ça reste au même endroit quand une
    personne deplace l''ascenseur et ça bloque l''autorefresh l''on bloque l''autorefresh,
    d''ailleur en dehors de oupout il n''y en a pas besoin'
  id: 893552ce
  notes: 'Root cause identified: Auto-refresh every 3 seconds (setInterval(refresh,
    3000)) calls renderTabContent() which recreates DOM and resets scroll. When user
    manually scrolls up in spec/task/output sections, the polling forces scroll back
    to bottom after 3 seconds (via pre.scrollTop = pre.scrollHeight in renderOutputPane
    and streaming handlers).

    Auto-completed (bulk execution, task 1/2)'
  phase_id: ''
  status: DONE
  title: Investigate root cause
  updated_at: '2026-03-08T11:08:42.916309'
- created_at: '2026-03-08T11:05:22.771061'
  description: Apply the fix based on the investigation findings
  id: 8953be2a
  notes: 'Implementation complete: (1) Added state._userScrolling and state._autoRefreshBlocked
    flags (2) setupScrollDetection() registers passive scroll listeners on spec/tasks/output
    tabs (3) Scroll detection blocks polling for 5 seconds after user stops scrolling
    (4) Created _autoScrollOutput() helper for selective auto-scroll in output only
    (5) Replaced all pre.scrollTop = pre.scrollHeight with _autoScrollOutput() calls
    (5 locations) (6) Modified refresh() to skip panel re-render when user is scrolling

    Auto-completed (bulk execution, task 2/2)'
  phase_id: ''
  status: DONE
  title: Implement fix
  updated_at: '2026-03-08T11:08:58.733500'
